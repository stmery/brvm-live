name: Mise a jour des donnees BRVM

on:
  schedule:
    - cron: "0 6,12,18 * * 1-6"
  workflow_dispatch:
    inputs:
      backfill:
        description: "Backfill depuis cette date (AAAA-MM-JJ). Vide = mise a jour du jour."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: |
          if [ -n "${{ github.event.inputs.backfill }}" ]; then
            python build_data.py --from "${{ github.event.inputs.backfill }}"
          else
            python build_data.py --update
          fi
      - run: |
          git config user.name "brvm-live-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data.json
          git commit -m "Donnees BRVM mises a jour" || echo "Rien a committer."
          git push
